<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Impfbuch-App">
  <defs>
    <clipPath id="tile"><rect x="0" y="0" width="96" height="96" rx="24"/></clipPath>
  </defs>
  <g clip-path="url(#tile)">
    <rect width="96" height="96" fill="#F4EFDF"/>
    <g transform="rotate(8 48 48)">
      <!-- Schatten -->
      <path d="M28.5 20.5 h36 a6 6 0 0 1 6 6 v49 h-42 z" fill="#000" opacity="0.10" transform="translate(2.6,2.2)"/>
      <!-- Heft: linke Hälfte -->
      <path d="M28 20 h20 v56 h-20 z" fill="#E7B53C"/>
      <!-- Heft: rechte Hälfte mit runder Ecke oben rechts -->
      <path d="M48 20 h16 a6 6 0 0 1 6 6 v50 h-22 z" fill="#EFC14E"/>
      <!-- Linien -->
      <rect x="35" y="34" width="27" height="3.6" rx="0.8" fill="#4A3208"/>
      <rect x="38" y="41.5" width="21" height="1.8" rx="0.8" fill="#4A3208"/>
      <!-- Feld unten -->
      <rect x="41" y="58" width="17" height="8.5" fill="none" stroke="#4A3208" stroke-width="1.8"/>
    </g>
  </g>
</svg>
